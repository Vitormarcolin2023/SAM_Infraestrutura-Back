spring.application.name=SAM_FullStack

server.port=8085
spring.jpa.hibernate.ddl-auto=update

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true


spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.security.jwt.secret=${JWT_SECRET}
app.security.token.url=${TOKEN_URL}
app.security.client.secret=${CLIENT_SECRET}
app.security.client.id=${CLIENT_ID}

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8081/realms/SAM
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8081/realms/SAM/protocol/openid-connect/certs
